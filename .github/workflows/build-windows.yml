name: build windows
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - cppjs-core/**
      - cppjs-extensions/**
      - cppjs-packages/**
      - cppjs-plugins/**
      - cppjs-samples/**
      - .github/workflows/build-windows.yml
  pull_request:
    branches:
      - main
    paths:
      - cppjs-core/cpp.js/**
      - cppjs-plugins/**
      - .github/workflows/build-windows.yml

permissions: {}
jobs:
  build:
    runs-on: Windows
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pnpm install
      - name: Build for windows
        run: pnpm run ci:windows:build
