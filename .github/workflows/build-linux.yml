name: build linux
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - cppjs-core/**
      - cppjs-extensions/**
      - cppjs-packages/**
      - cppjs-plugins/**
      - cppjs-samples/**
      - .github/workflows/build-linux.yml
  pull_request:
    branches:
      - main
    paths:
      - cppjs-core/**
      - cppjs-extensions/**
      - cppjs-packages/**
      - cppjs-plugins/**
      - cppjs-samples/**
      - .github/workflows/build-linux.yml

permissions: {}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 #v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Build for Linux
        run: pnpm run ci:linux:build
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
      - name: Run Playwright tests
        # Playgrounds are excluded: they exercise the CURRENT workspace state of
        # every prebuilt package, and those prebuilt trees only exist on dev
        # machines. Playgrounds are validated locally (see AGENTS.md).
        run: pnpm run ci:linux:e2e
