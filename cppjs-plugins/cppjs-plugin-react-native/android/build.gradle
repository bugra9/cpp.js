apply plugin: 'com.android.library'

// React Native's new-arch autolinking generates its own CMakeLists for this
// module and ignores the `externalNativeBuild { path "../script/CMakeLists.txt" }`
// block below, so neither `build_js.js` (SWIG bridges) nor `build_android.js`
// (native asset copy under android/app/src/main/assets/cppjs) ran when the
// module was consumed via autolinking. Invoke both directly at Gradle
// configuration phase: by the time any native compile or APK-packaging task
// starts, bridges and runtime assets are already on disk.
def __cppjsAppRoot = new File(rootProject.projectDir, '..').absolutePath
def __cppjsScriptDir = new File(projectDir, '../script').absolutePath

def __cppjsRun = { String label, List<String> args ->
    logger.lifecycle("[cppjs] ${label} :: node ${args.join(' ')} (cwd=${__cppjsAppRoot})")
    def proc = new ProcessBuilder(['node'] + args)
        .directory(new File(__cppjsAppRoot))
        .inheritIO()
        .start()
    def code = proc.waitFor()
    if (code != 0) {
        throw new GradleException("[cppjs] ${label} failed with exit code ${code}")
    }
}

__cppjsRun("Generate SWIG bridges", [new File(__cppjsScriptDir, 'build_js.js').absolutePath, 'android'])
// Asset copy is ABI-agnostic (GDAL share files are plain text) — pin to
// arm64-v8a/Release so the script can resolve a buildTarget and proceed.
__cppjsRun("Copy native runtime assets", [new File(__cppjsScriptDir, 'build_android.js').absolutePath, 'arm64-v8a', 'Release'])

android {
    compileSdkVersion 34
    buildToolsVersion "34.0.0"

    defaultConfig {
        minSdkVersion 23
        targetSdkVersion 34
        versionCode 100
        versionName "1.0.0"

        externalNativeBuild {
             cmake {
                 arguments "-DCPPJS_PROJECT_PATH=${rootProject.projectDir.parent}"
            }
        }

        ndk {
            abiFilters 'arm64-v8a', 'x86_64'
        }
    }

    externalNativeBuild {
        cmake {
            path "../script/CMakeLists.txt"
            version "3.25.0+"
        }
    }
}

dependencies {
    implementation "com.facebook.react:react-native:+"
}
