apply plugin: 'com.android.library'

android {
    compileSdkVersion 34
    buildToolsVersion "34.0.0"

    defaultConfig {
        minSdkVersion 23
        targetSdkVersion 34
        versionCode 100
        versionName "1.0.0"

        externalNativeBuild {
             cmake {
                 arguments "-DCPPJS_PROJECT_PATH=${rootProject.projectDir.parent}"
            }
        }

        ndk {
            abiFilters 'arm64-v8a', 'x86_64'
        }
    }

    externalNativeBuild {
        cmake {
            path "../script/CMakeLists.txt"
            version "3.25.0+"
        }
    }
}

dependencies {
    implementation "com.facebook.react:react-native:+"
}
