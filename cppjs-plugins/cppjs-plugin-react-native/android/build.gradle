apply plugin: 'com.android.library'
apply plugin: 'com.facebook.react'

// build_js.js (SWIG/embind bridges), build_android_deps.js (dependency source rebuilds)
// and build_android_assets.js (runtime asset copy into this library's assets) run as
// registered tasks — no external process at configuration time, so the build stays
// configuration-cache compatible. Each script is content-cached internally, which keeps
// the always-run tasks cheap.
def __cppjsAppRoot = new File(rootProject.projectDir, '..').absolutePath
def __cppjsScriptDir = new File(projectDir, '../script').absolutePath

// cpp.js ships Android prebuilts for arm64-v8a and x86_64 only. Build the
// intersection with the app's reactNativeArchitectures so only the requested
// supported ABIs are built (never an unsupported one).
def cppjsAndroidAbis = ['arm64-v8a', 'x86_64']
def cppjsAbis = providers.gradleProperty('reactNativeArchitectures')
    .map { value -> (value.split(',') as List).intersect(cppjsAndroidAbis) ?: cppjsAndroidAbis }
    .getOrElse(cppjsAndroidAbis)

def cppjsBridges = tasks.register('cppjsBridges', Exec) {
    workingDir __cppjsAppRoot
    commandLine 'node', new File(__cppjsScriptDir, 'build_js.js').absolutePath, 'android'
}
def cppjsDeps = tasks.register('cppjsDeps', Exec) {
    workingDir __cppjsAppRoot
    // Pinned to Release: dependency prebuilts ship Release-only, debug app builds link the same deps.
    commandLine 'node', new File(__cppjsScriptDir, 'build_android_deps.js').absolutePath, 'Release', cppjsAbis.join(',')
}
def cppjsAssets = tasks.register('cppjsAssets', Exec) {
    // Asset data may come from a freshly rebuilt dependency.
    dependsOn cppjsDeps
    workingDir __cppjsAppRoot
    // Asset copy is ABI-agnostic (data files are identical across ABIs) — pass the first
    // requested ABI only so the script can resolve a buildTarget.
    commandLine 'node', new File(__cppjsScriptDir, 'build_android_assets.js').absolutePath, cppjsAbis[0], 'Release'
}

// The library's own TurboModule codegen output (generated/source/codegen/jni) must
// exist before the native build configures: on a fresh checkout the react plugin does
// not order it ahead of CMake, and expo run:android failed with a missing jni dir
// until generateCodegenArtifactsFromSchema was run by hand. Match by name, lazily -
// the task is registered later by the react plugin.
def cppjsCodegen = tasks.matching { it.name == 'generateCodegenArtifactsFromSchema' }

tasks.named('preBuild').configure { dependsOn(cppjsBridges, cppjsDeps, cppjsAssets, cppjsCodegen) }
// CMake configure can also be triggered without preBuild (IDE sync, direct invocation).
tasks.matching { it.name.startsWith('configureCMake') }.configureEach {
    dependsOn(cppjsBridges, cppjsDeps, cppjsCodegen)
}

android {
    compileSdkVersion 34
    buildToolsVersion "34.0.0"

    buildFeatures {
        prefab true
    }

    defaultConfig {
        // RN 0.85's prefab (jsi/reactnative/hermestooling) is built for API 24, so the
        // consuming library must declare minSdk >= 24. Track the app's value when set.
        minSdkVersion(rootProject.ext.has('minSdkVersion') ? rootProject.ext.minSdkVersion : 24)
        targetSdkVersion 34
        versionCode 100
        versionName "1.0.0"

        externalNativeBuild {
             cmake {
                 // RN's prefab (jsi/reactnative/hermestooling) is built against the shared
                 // libc++; the consuming library must match or prefab linking is rejected.
                 arguments "-DCPPJS_PROJECT_PATH=${rootProject.projectDir.parent}",
                     "-DANDROID_STL=c++_shared"
            }
        }

        ndk {
            abiFilters(*cppjsAbis)
        }
    }

    externalNativeBuild {
        cmake {
            path "../script/CMakeLists.txt"
            version "3.25.0+"
        }
    }
}

dependencies {
    implementation "com.facebook.react:react-native:+"
}
