<!DOCTYPE html>

<html>

<head>
    <meta charset="utf-8">
    <title>Cpp.js Vanilla playground</title>
    <script src="./dist/cppjs-playground-web-vanilla-wasm-wasm32-mt-release.browser.js"></script>
    <script>
        // No ops_JSPI here: this playground builds the mt (pthreads) browser
        // runtime, which cannot carry -sJSPI, so the JSPI demo binding is
        // guarded out of the build. The mt demo is the thread roundtrip below.
        // await keeps the calls correct in both modes: the browser runtime
        // defaults to useWorker, where every binding returns a Promise.
        initCppJs({ path: './dist' }).then(async ({ Native }) => {
            await Native.runOnThread();
            document.querySelector('#cppMessage').innerHTML = 'ready (pthreads)';
            document.querySelector('#threadResult').innerHTML = await Native.getThreadResult();
        });
    </script>
    <style>
        body {
            padding: 50px;
        }

        table,
        th,
        td {
            border: 1px solid red;
            border-collapse: collapse;
        }

        table {
            width: 400px;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <p>Matrix multiplier with c++ &nbsp;&nbsp;=&gt;&nbsp;&nbsp; <span id="cppMessage">compiling ...</span></p>
    <p>Thread result &nbsp;&nbsp;:&nbsp;&nbsp; <span id="threadResult">...</span></p>
</body>

</html>
