<!DOCTYPE html>

<html>

<head>
    <meta charset="utf-8">
    <title>Cpp.js Vanilla playground</title>
    <script src="./dist/cppjs-playground-web-vanilla-wasm-wasm32-mt-release.browser.js"></script>
    <script>
        initCppJs({ path: './dist' }).then(({ Native }) => {
            console.log('zzz');
            Native.runOnThread();
            const y = Native.ops_JSPI();
            console.log('zzz2');
            console.log(y);
            y.then(() => {
                console.log('aaa');
                document.querySelector('#cppMessage').innerHTML = Native.sample();
            });
            setTimeout(() => {
                document.querySelector('#threadResult').innerHTML = Native.getThreadResult();
            }, 5000);
        });
    </script>
    <style>
        body {
            padding: 50px;
        }

        table,
        th,
        td {
            border: 1px solid red;
            border-collapse: collapse;
        }

        table {
            width: 400px;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <p>Matrix multiplier with c++ &nbsp;&nbsp;=&gt;&nbsp;&nbsp; <span id="cppMessage">compiling ...</span></p>
    <p>Thread result &nbsp;&nbsp;:&nbsp;&nbsp; <span id="threadResult">...</span></p>
</body>

</html>
